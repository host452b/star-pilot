name: Star Pilot — Auto Triage & Portal

# ---------------------------------------------------------------
# triggers
# ---------------------------------------------------------------
on:
  # daily at 08:00 UTC (Mon-Fri), weekly full sync on Sunday
  schedule:
    - cron: "0 8 * * 1-5"   # weekday: readme only
    - cron: "0 8 * * 0"     # sunday:  full pipeline (triage + readme + migrate)

  # manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "run mode"
        required: true
        default: "full"
        type: choice
        options:
          - triage
          - readme
          - migrate
          - cleanup
          - full

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ---- setup ----
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: authenticate gh CLI
        run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      # ---- restore translation cache ----
      - name: restore translation cache
        uses: actions/cache@v4
        with:
          path: output/.translation_cache.json
          key: translations-${{ hashFiles('config/rules.yaml') }}
          restore-keys: translations-

      # ---- determine run mode ----
      - name: resolve command
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "cmd=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 * * 0" ]; then
            echo "cmd=full" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=readme" >> "$GITHUB_OUTPUT"
          fi

      # ---- run star-pilot ----
      - name: run star-pilot (${{ steps.mode.outputs.cmd }})
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py ${{ steps.mode.outputs.cmd }}

      # ---- commit portal changes ----
      - name: commit and push
        run: |
          git config user.name "star-pilot[bot]"
          git config user.email "star-pilot[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "::notice::no portal changes detected"
          else
            STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(portal): auto-update star navigator — ${STAMP}"
            git push
          fi

      # ---- job summary ----
      - name: write summary
        if: always()
        run: |
          CMD="${{ steps.mode.outputs.cmd }}"
          echo "## Star Pilot Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| field | value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mode | \`${CMD}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| time | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f output/triage_report.json ]; then
            TOTAL=$(python -c "import json; d=json.load(open('output/triage_report.json')); print(len(d))")
            echo "| repos classified | ${TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f output/README.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Portal: [README.md](output/README.md) · [README_CN.md](output/README_CN.md)" >> "$GITHUB_STEP_SUMMARY"
          fi
